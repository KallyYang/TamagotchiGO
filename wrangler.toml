name = "tamagotchigo"
main = "worker/worker.js"
compatibility_date = "2024-11-01"

# 通过 Static Assets 托管 web/ 目录。Worker 仅处理 /api/* 请求，其它一律返给静态资源。
[assets]
directory = "./web"
binding = "ASSETS"

# Workers KV 绑定。需要先在 Cloudflare 创建一个 KV 命名空间，
# 然后把它的 id / preview_id 填到这里：
#   wrangler kv namespace create "tamago-saves"
#   wrangler kv namespace create "tamago-saves" --preview
[[kv_namespaces]]
binding = "SAVE_KV"
id = "REPLACE_WITH_KV_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

# 可选鉴权 Token。建议通过 `wrangler secret put SAVE_TOKEN` 配置，而不是直接写在这里。
# [vars]
# SAVE_TOKEN = "change-me"

# 本地开发服务器配置（npx wrangler dev 使用）。
[dev]
port = 8787
